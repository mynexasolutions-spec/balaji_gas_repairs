<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Balaji Gas Repairs - Professional Gas Stove & Chimney Repair Bangalore{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <!-- FAVICONS -->
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.PNG') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.PNG') }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  
  
  {% include 'partials/navbar.html' %}

  {% block content %}{% endblock %}

  {% include 'partials/footer.html' %}

  

  <script>
    // Hero slider - updated for animation compatibility if needed
    const slides = document.querySelectorAll('.slide');
    if (slides.length) {
      let current = 0;
      function nextSlide() {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
      }
      setInterval(nextSlide, 5000);
    }

    // Hamburger & Dropdown logic
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.querySelector('.nav-links');
    
    if (hamburger) {
      hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('nav-active');
        hamburger.classList.toggle('toggle');
      });

      // Close menu when a link is clicked
      navLinks.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') {
          navLinks.classList.remove('nav-active');
          hamburger.classList.remove('toggle');
        }
      });
    }
  </script>
  {% block extra_js %}{% endblock %}

  <!-- FLOATING CONTACT ICONS -->
  <div class="floating-contact">
    <a href="https://wa.me/919799011663" class="floating-icon whatsapp" target="_blank" title="WhatsApp Us">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" />
    </a>
    <a href="tel:+919799011663" class="floating-icon phone" title="Call Us">
        <div class="phone-icon-wrap">📞</div>
    </a>
  </div>
</body>
</html>
